[package]
name = "moto-rush"
description = "A posixy shell implemented in Rust with minimal external dependencies."
version = "0.1.0"
edition = "2024"
authors = ["U. Lasiotus"]
keywords = ["shell"]
categories = ["shell"]
repository = "https://github.com/moturus/rush"
license = "MIT OR Apache-2.0"

[[bin]]
name = "rush"
path = "src/main.rs"

[dependencies]
# glob = "0.3.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

# On Motor OS, `std::process::id()` panics (Motor pids are u64), so pids come
# from moto-sys instead — see `sys::pid()`. moto-rt is where the `E_*` error
# constants live (`ErrorCode` is a bare `u16`, not an enum); moto-sys re-exports
# the type but not the constants, so `kill` names the crate directly.
[target.'cfg(not(unix))'.dependencies]
moto-sys = { path = "../../sys/lib/moto-sys" }
moto-rt = { path = "../../sys/lib/moto-rt" }

[profile.release]
panic = "abort"
lto = "fat"
strip = true
codegen-units = 1
