[package]
name = "lorry"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
clap = { version = "=4.6.0", default-features = false, features = [
    "error-context",
    "help",
    "std",
    "suggestions",
    "usage",
] }
flate2 = { version = "=1.1.9", default-features = false, features = [
    "rust_backend",
] }
semver = { version = "=1.0.26", default-features = false, features = ["std"] }
serde = { version = "=1.0.228", default-features = false, features = ["std"] }
serde_json = { version = "=1.0.150", default-features = false, features = [
    "std",
] }
sha2 = { version = "=0.10.8", default-features = false, features = [
    "force-soft",
    "std",
] }
toml_edit = { version = "=0.22.26", default-features = false, features = [
    "parse",
] }

[profile.release]
panic = "abort"
lto = "fat"
strip = true
codegen-units = 1
