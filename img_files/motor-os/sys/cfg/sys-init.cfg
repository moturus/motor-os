# tty is required.
tty:/sys/sys-tty

# strobe is optional.
strobe:/sys/strobe

# Services (optional).
# The line must start with svc:, followed by capabilities
# (see caps.rs in moto-sys).

# Stats registry: userspace stats providers register here so collectors
# (e.g. `sysbox stats`, `free`) can discover them. CAP_LOG (8) for logging.
# svc:8:/sys/sys-stats-reg

# caps 60 = CAP_SPAWN(4) | CAP_LOG(8) | CAP_SHUTDOWN(16) | CAP_SPAWN_DETACHED(32).
# russhd needs CAP_SPAWN_DETACHED so it can pass it to the shells it execs, which
# in turn lets a program like rmux run a server that survives the ssh session.
svc:60:/bin/russhd /sys/cfg/sshd.toml
